# Publishes sheaf-core, sheaf-io, sheaf-nn to crates.io (in dependency order)
# when a v* tag is pushed, then attaches the browser-demo bundle
# (sheaf-web-demo-<tag>.zip: web/ + the wasm-bindgen pkg) to the GitHub
# release. sheaf-demo and sheaf-web are publish = false (repo-only).
#
# Publishing uses crates.io Trusted Publishing (OIDC): the
# rust-lang/crates-io-auth-action step mints a short-lived registry token, so
# no long-lived CARGO_REGISTRY_TOKEN secret is needed. ONE-TIME SETUP per
# crate (sheaf-core, sheaf-nn, sheaf-io): on crates.io, crate Settings ->
# Trusted Publishing -> add this GitHub repo with workflow filename
# "release.yml" (and environment "crates-io"). Once configured, the old
# CARGO_REGISTRY_TOKEN repository secret can be deleted.
#
# Release procedure:
#   1. bump [workspace.package].version and the three intra-workspace dep
#      versions in the root Cargo.toml (they must match)
#   2. commit, then: git tag v<version> && git push origin v<version>
name: Release to crates.io

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: write # gh release create + asset upload
      id-token: write # crates.io Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-bindgen-cli (pinned, matches crates/sheaf-web)
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen@0.2.126

      - name: Check tag matches workspace version
        run: |
          v=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name=="sheaf-core") | .version')
          [ "v$v" = "${GITHUB_REF_NAME}" ] || { echo "tag ${GITHUB_REF_NAME} != workspace version v$v"; exit 1; }

      - name: Tests
        run: cargo test --workspace

      - name: Golden parity vs JAX reference
        run: cargo run --release -p sheaf-demo --bin parity_check

      # Dependency order: sheaf-nn depends on sheaf-core; sheaf-io depends on
      # both. cargo publish (1.66+) waits for each crate to be available in
      # the sparse index before returning, so sequential publishes are safe.
      # Each step skips versions already on crates.io so a partially-failed
      # release can be re-run.
      - name: Authenticate with crates.io (Trusted Publishing / OIDC)
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish sheaf-core, sheaf-nn, sheaf-io (in order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          v="${GITHUB_REF_NAME#v}"
          for c in sheaf-core sheaf-nn sheaf-io; do
            if curl -sfA "sheaf-rs-release (github actions)" \
                 "https://crates.io/api/v1/crates/$c/$v" > /dev/null; then
              echo "$c $v already published — skipping"
            else
              cargo publish -p "$c" --locked
            fi
          done

      - name: GitHub release (create before upload; idempotent for reruns)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" > /dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" \
              --title "sheaf-rs ${GITHUB_REF_NAME}" \
              --notes "Published sheaf-core, sheaf-io, sheaf-nn ${GITHUB_REF_NAME#v} to crates.io."

      # Same bundle the Pages workflow deploys: static web/ + wasm-bindgen pkg.
      - name: Build browser demo bundle (web/ + wasm pkg)
        run: |
          cargo build --target wasm32-unknown-unknown --release -p sheaf-web
          wasm-bindgen --target web --out-dir web/pkg \
            target/wasm32-unknown-unknown/release/sheaf_web.wasm
          (cd web && zip -r "../sheaf-web-demo-${GITHUB_REF_NAME}.zip" . -x "test/*")

      - name: Upload demo bundle to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "sheaf-web-demo-${GITHUB_REF_NAME}.zip" --clobber
